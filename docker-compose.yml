version: '3.9'

services:

  clouddiskapp:
    build: ./CloudDiskApp
    container_name: clouddiskapp
    ports:
      - "3002:3000"

  homepage:
    image: nginx:alpine
    container_name: homepage
    ports:
      - "80:80"
    volumes:
      - ./homepage.html:/usr/share/nginx/html/homepage.html
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
