<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>极简云盘 (CloudDiskApp)</title>
  <style>
    :root {
      --primary-color: #4F46E5;
      --primary-hover: #4338CA;
      --bg-color: #F3F4F6;
      --card-bg: #FFFFFF;
      --text-main: #111827;
      --text-muted: #6B7280;
      --border-color: #E5E7EB;
      --danger-color: #EF4444;
      --danger-hover: #DC2626;
    }
    
    * {
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background-color: var(--bg-color);
      color: var(--text-main);
      margin: 0;
      padding: 2rem 1rem;
      display: flex;
      justify-content: center;
      min-height: 100vh;
    }

    .container {
      background: var(--card-bg);
      width: 100%;
      max-width: 800px;
      border-radius: 12px;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
      padding: 2rem;
      align-self: flex-start;
    }

    h1 {
      margin-top: 0;
      font-size: 1.75rem;
      color: var(--primary-color);
      border-bottom: 2px solid var(--border-color);
      padding-bottom: 1rem;
      margin-bottom: 2rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    /* Upload Section */
    .upload-section {
      border: 2px dashed var(--border-color);
      border-radius: 8px;
      padding: 2.5rem 1rem;
      text-align: center;
      margin-bottom: 2rem;
      transition: all 0.3s ease;
      background-color: #F9FAFB;
    }

    .upload-section:hover, .upload-section.dragover {
      border-color: var(--primary-color);
      background-color: #EEF2FF;
    }

    .file-input-wrapper {
      position: relative;
      display: inline-block;
      margin-top: 1rem;
    }

    .file-input-wrapper input[type=file] {
      font-size: 100px;
      position: absolute;
      left: 0;
      top: 0;
      opacity: 0;
      cursor: pointer;
      width: 100%;
      height: 100%;
    }

    .btn {
      background-color: var(--primary-color);
      color: white;
      border: none;
      padding: 0.6rem 1.2rem;
      border-radius: 6px;
      cursor: pointer;
      font-size: 1rem;
      font-weight: 500;
      transition: background-color 0.2s;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
    }

    .btn:hover {
      background-color: var(--primary-hover);
    }

    .btn-danger {
      background-color: var(--danger-color);
    }

    .btn-danger:hover {
      background-color: var(--danger-hover);
    }

    .btn-sm {
      padding: 0.4rem 0.8rem;
      font-size: 0.875rem;
    }

    /* Progress Bar */
    .progress-container {
      width: 100%;
      max-width: 400px;
      background-color: var(--border-color);
      border-radius: 4px;
      margin: 1.5rem auto 0;
      height: 6px;
      display: none;
      overflow: hidden;
    }

    .progress-bar {
      height: 100%;
      background-color: var(--primary-color);
      width: 0%;
      transition: width 0.2s ease;
    }

    /* File List */
    h2 {
      font-size: 1.25rem;
      margin-bottom: 1rem;
    }

    .file-list {
      list-style: none;
      padding: 0;
      margin: 0;
      border: 1px solid var(--border-color);
      border-radius: 8px;
      overflow: hidden;
    }

    .file-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1rem 1.25rem;
      border-bottom: 1px solid var(--border-color);
      background-color: #FFF;
      transition: background-color 0.2s;
    }

    .file-item:hover {
      background-color: #F9FAFB;
    }

    .file-item:last-child {
      border-bottom: none;
    }

    .file-info {
      display: flex;
      flex-direction: column;
      overflow: hidden;
      padding-right: 1rem;
    }

    .file-name {
      font-weight: 500;
      margin-bottom: 0.3rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .file-meta {
      font-size: 0.85rem;
      color: var(--text-muted);
    }

    .file-actions {
      display: flex;
      gap: 0.5rem;
      flex-shrink: 0;
    }

    .empty-state {
      padding: 3rem;
      text-align: center;
      color: var(--text-muted);
      font-style: italic;
    }

    @media (max-width: 600px) {
      .file-item {
        flex-direction: column;
        align-items: flex-start;
        gap: 1rem;
      }
      .file-actions {
        width: 100%;
        justify-content: flex-end;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>☁️ 极简云盘 (CloudDiskApp)</h1>
    
    <div class="upload-section" id="dropZone">
      <div style="color: var(--text-muted); margin-bottom: 0.5rem;">
        <svg width="48" height="48" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"></path>
        </svg>
      </div>
      <p style="margin: 0; font-size: 1.1rem;">拖拽文件到这里，或者</p>
      <div class="file-input-wrapper">
        <button class="btn">选择并上传文件</button>
        <input type="file" id="fileInput" onchange="uploadFile(this.files)">
      </div>
      <div class="progress-container" id="progressContainer">
        <div class="progress-bar" id="progressBar"></div>
      </div>
      <div id="uploadStatusWrapper" style="display: none; margin-top: 0.5rem; align-items: center; justify-content: center; gap: 10px;">
        <p id="uploadStatus" style="margin: 0; font-size: 0.85rem; color: var(--primary-color);"></p>
        <button id="cancelBtn" class="btn btn-sm btn-danger" style="display: none;" onclick="cancelUpload()">取消</button>
      </div>
    </div>

    <h2>📁 我的文件</h2>
    <ul class="file-list" id="fileList">
      <!-- 文件列表将通过 JS 动态生成 -->
      <li class="empty-state">加载中...</li>
    </ul>
  </div>

  <script>
    // 工具函数：格式化文件大小
    function formatBytes(bytes, decimals = 2) {
      if (bytes === 0) return '0 Bytes';
      const k = 1024;
      const dm = decimals < 0 ? 0 : decimals;
      const sizes = ['B', 'KB', 'MB', 'GB', 'TB'];
      const i = Math.floor(Math.log(bytes) / Math.log(k));
      return parseFloat((bytes / Math.pow(k, i)).toFixed(dm)) + ' ' + sizes[i];
    }

    // 工具函数：格式化时间
    function formatDate(dateString) {
      const date = new Date(dateString);
      return date.toLocaleString('zh-CN', { 
        year: 'numeric', month: '2-digit', day: '2-digit',
        hour: '2-digit', minute: '2-digit'
      });
    }

    // 获取并渲染文件列表
    async function fetchFiles() {
      try {
        const response = await fetch('/api/files');
        const files = await response.json();
        const fileList = document.getElementById('fileList');
        fileList.innerHTML = '';

        if (files.length === 0) {
          fileList.innerHTML = '<li class="empty-state">云盘空空如也，快去上传文件吧！</li>';
          return;
        }

        files.forEach(file => {
          const li = document.createElement('li');
          li.className = 'file-item';
          li.innerHTML = `
            <div class="file-info">
              <span class="file-name" title="${file.name}">${file.name}</span>
              <span class="file-meta">${formatBytes(file.size)} • ${formatDate(file.time)}</span>
            </div>
            <div class="file-actions">
              <a href="/download/${encodeURIComponent(file.name)}" class="btn btn-sm" download="${file.name}">下载</a>
              <button class="btn btn-sm btn-danger" onclick="deleteFile('${file.name}')">删除</button>
            </div>
          `;
          fileList.appendChild(li);
        });
      } catch (error) {
        console.error('获取文件列表失败:', error);
        document.getElementById('fileList').innerHTML = '<li class="empty-state" style="color: var(--danger-color);">加载失败，请检查网络或刷新页面</li>';
      }
    }

    // 全局保存当前的 XMLHttpRequest 实例，以便取消
    let currentXhr = null;

    // 上传文件逻辑
    function uploadFile(files) {
      const file = files[0];
      if (!file) return;

      const formData = new FormData();
      formData.append('file', file);

      const progressContainer = document.getElementById('progressContainer');
      const progressBar = document.getElementById('progressBar');
      const uploadStatusWrapper = document.getElementById('uploadStatusWrapper');
      const uploadStatus = document.getElementById('uploadStatus');
      const cancelBtn = document.getElementById('cancelBtn');
      const fileInput = document.getElementById('fileInput');
      
      progressContainer.style.display = 'block';
      progressBar.style.width = '0%';
      uploadStatusWrapper.style.display = 'flex';
      cancelBtn.style.display = 'inline-flex';
      uploadStatus.style.color = 'var(--text-muted)';
      uploadStatus.textContent = '准备上传...';

      currentXhr = new XMLHttpRequest();
      currentXhr.open('POST', '/api/upload', true);

      currentXhr.upload.onprogress = function(e) {
        if (e.lengthComputable) {
          const percentComplete = (e.loaded / e.total) * 100;
          progressBar.style.width = percentComplete + '%';
          uploadStatus.textContent = `上传中: ${Math.round(percentComplete)}%`;
        }
      };

      currentXhr.onload = function() {
        cancelBtn.style.display = 'none';
        if (currentXhr.status === 200) {
          progressBar.style.width = '100%';
          uploadStatus.style.color = 'var(--primary-color)';
          uploadStatus.textContent = '上传成功！';
          setTimeout(() => {
            progressContainer.style.display = 'none';
            uploadStatusWrapper.style.display = 'none';
            fetchFiles(); // 刷新列表
          }, 1000);
        } else {
          uploadStatus.style.color = 'var(--danger-color)';
          uploadStatus.textContent = '上传失败';
          setTimeout(() => {
            progressContainer.style.display = 'none';
            uploadStatusWrapper.style.display = 'none';
          }, 2000);
        }
        fileInput.value = ''; // 清空选择
        currentXhr = null;
      };

      currentXhr.onerror = function() {
        cancelBtn.style.display = 'none';
        uploadStatus.style.color = 'var(--danger-color)';
        uploadStatus.textContent = '网络错误，上传失败';
        setTimeout(() => {
          progressContainer.style.display = 'none';
          uploadStatusWrapper.style.display = 'none';
        }, 2000);
        fileInput.value = '';
        currentXhr = null;
      };

      currentXhr.onabort = function() {
        cancelBtn.style.display = 'none';
        progressBar.style.width = '0%';
        uploadStatus.style.color = 'var(--danger-color)';
        uploadStatus.textContent = '上传已取消';
        setTimeout(() => {
          progressContainer.style.display = 'none';
          uploadStatusWrapper.style.display = 'none';
        }, 2000);
        fileInput.value = '';
        currentXhr = null;
      };

      currentXhr.send(formData);
    }

    // 取消上传逻辑
    function cancelUpload() {
      if (currentXhr) {
        currentXhr.abort();
      }
    }

    // 删除文件逻辑
    async function deleteFile(filename) {
      if (!confirm(`确定要删除文件 "${filename}" 吗？`)) return;
      
      try {
        const response = await fetch(`/api/files/${encodeURIComponent(filename)}`, {
          method: 'DELETE'
        });
        if (response.ok) {
          fetchFiles();
        } else {
          alert('删除失败，可能文件不存在');
        }
      } catch (error) {
        console.error('删除请求失败:', error);
        alert('删除请求发生错误');
      }
    }

    // 拖拽上传支持
    const dropZone = document.getElementById('dropZone');
    
    dropZone.addEventListener('dragover', (e) => {
      e.preventDefault();
      dropZone.classList.add('dragover');
    });

    dropZone.addEventListener('dragleave', (e) => {
      e.preventDefault();
      dropZone.classList.remove('dragover');
    });

    dropZone.addEventListener('drop', (e) => {
      e.preventDefault();
      dropZone.classList.remove('dragover');
      if (e.dataTransfer.files && e.dataTransfer.files.length > 0) {
        uploadFile(e.dataTransfer.files);
      }
    });

    // 页面加载完毕后获取列表
    document.addEventListener('DOMContentLoaded', fetchFiles);
  </script>
</body>
</html>
